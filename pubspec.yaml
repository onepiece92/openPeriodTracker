name: luna_period_tracker
description: "Open Period & Cycle Tracker"
publish_to: 'none'

version: 1.0.0+3

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.0.0
  sqflite: ^2.3.0
  path: ^1.8.0
  intl: ^0.18.0
  google_fonts: ^6.1.0
  go_router: ^14.0.0
  http: ^1.2.0
  tflite_flutter: ^0.11.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  path_provider: ^2.1.0
  share_plus: ^12.0.2
  file_picker: ^8.0.0
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.3
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.3.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/icon/   

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/logo.png"

  min_sdk_android: 21

  # Android adaptive icon (recommended)
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon/logo.png"

  # Optional platforms
  web:
    generate: true
    image_path: "assets/icon/logo.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"

  windows:
    generate: true
    image_path: "assets/icon/logo.png"

  macos:
    generate: true
    image_path: "assets/icon/logo.png"